<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign-up</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="index.js" defer></script>
    </head>
    <body>
        <div class="imgContainer">
            <img src="assets/odin-lined.png" alt="logo">
            <p class="credits">Photo by Sam Roy on Unsplash</p>
        </div>
        <form action="" method="get" class="container">
            <div class="title">
                <h1 class="hone">Sign up</h1>
            </div>
            <div class="header">
                <p>
                    This is not a real online service You know you need something like this in your
                    life to help you realize your deepest dreams. Sign up now to get started.
                </p>
                <p>You know you want to.</p>
            </div>
            <div class="inputs">
                <fieldset>
                    <legend>Let's do this</legend>
                    <div>
                        <div>
                            <label for="firstName">First Name</label><br />
                            <input id="firstName" type="text" required minlength="3" /><br />
                        </div>
                        <div>
                            <label for="email">Email</label><br />
                            <input type="email" id="email" required /><br />
                        </div>
                        <div>
                            <label for="password">Password</label><br />
                            <input id="password" type="password" required minlength="6" />
                        </div>
                    </div>
                    <div>
                        <div>
                            <label for="lastName">Last Name</label><br />
                            <input id="lastName" type="text" required minlength="3" /><br />
                        </div>
                        <div>
                            <label for="phoneNumber">Phone Number</label><br />
                            <input
                                id="phoneNumber"
                                type="text"
                                pattern="\d{4}[\-]\d{4}"
                                required
                                placeholder="6140-3925"
                            /><br />
                        </div>
                        <div>
                            <label for="confirmPassword">Confirm Password</label><br />
                            <input id="confirmPassword" type="password" required minlength="6" />
                        </div>
                    </div>
                </fieldset>
            </div>
            <div class="footer">
                <button>Create Account</button>
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>
        </form>
    </body>
</html>
